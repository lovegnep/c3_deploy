<!-- 倒计时脚本 -->
<script>
    function getRTime() {
        var EndTime = new Date('2025/11/15 18:30:00'); // 服务器开始时间
        var NowTime = new Date();
        var t = EndTime.getTime() - NowTime.getTime();

        if (t >= 0) {
            // 服务器未开启，显示倒计时
            var d = Math.floor(t / (1000 * 60 * 60 * 24));
            var h = Math.floor(t % (1000 * 60 * 60 * 24) / (1000 * 60 * 60));
            var m = Math.floor(t % (1000 * 60 * 60) / (1000 * 60));
            var s = Math.floor(t % (1000 * 60) / 1000);

            // 确保时间显示为双位数
            d = (d >= 0) ? d : '00';
            h = (h >= 10) ? h : '0' + h;
            m = (m >= 10) ? m : '0' + m;
            s = (s >= 10) ? s : '0' + s;

            document.getElementById("t_d").innerHTML = d;
            document.getElementById("t_h").innerHTML = h;
            document.getElementById("t_m").innerHTML = m;
            document.getElementById("t_s").innerHTML = s;
            document.getElementById("countdown").style.display = "block";
            document.getElementById("con").innerHTML = "服务器即将开启";
            document.getElementById("con").style.color = "#FF00FF";
        } else {
            // 服务器已开启，显示运行时间
            var runTime = Math.abs(t); // 取绝对值计算已运行时间
            var d = Math.floor(runTime / (1000 * 60 * 60 * 24));
            var h = Math.floor(runTime % (1000 * 60 * 60 * 24) / (1000 * 60 * 60));
            var m = Math.floor(runTime % (1000 * 60 * 60) / (1000 * 60));
            var s = Math.floor(runTime % (1000 * 60) / 1000);

            // 确保时间显示为双位数
            d = (d >= 10) ? d : '0' + d;
            h = (h >= 10) ? h : '0' + h;
            m = (m >= 10) ? m : '0' + m;
            s = (s >= 10) ? s : '0' + s;

            document.getElementById("t_d").innerHTML = d;
            document.getElementById("t_h").innerHTML = h;
            document.getElementById("t_m").innerHTML = m;
            document.getElementById("t_s").innerHTML = s;
            document.getElementById("countdown").style.display = "block";
            document.getElementById("con").innerHTML = "服务器已开启";
            document.getElementById("con").style.color = "red";
        }
    }
    setInterval(getRTime, 1000);
    getRTime();
</script>
